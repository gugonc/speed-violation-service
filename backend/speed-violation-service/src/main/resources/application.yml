server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: speed-violation-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true

violation:
  tolerance:
    kmh: 7
    percent: 7
    threshold-speed: 100

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.velsis.speedviolation: INFO
