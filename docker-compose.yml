services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: speedviolations
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d speedviolations"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/speed-violation-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/speedviolations
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/speed-violation-console
    ports:
      - "3000:3000"
    environment:
      API_URL: http://localhost:8080
    depends_on:
      - backend
